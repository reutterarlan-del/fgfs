<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading... - FGFS MEMOIRE</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0b1026;
            --glass-bg: rgba(15, 20, 35, 0.85);
            --glass-border: rgba(255, 223, 80, 0.3);
            --text-white: #f0f0f0;      
            --text-grey: #aaaaaa; 
            --gogh-yellow: #fcd440;     
        }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 3px;
            background: var(--gogh-yellow); width: 0%; z-index: 1000;
            box-shadow: 0 0 10px var(--gogh-yellow);
            transition: width 0.1s;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-white);
            /* 正文使用指定的无衬线组合，字重设为 300 解决过粗问题 */
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            font-weight: 300;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0; padding: 0;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 30%, #1a254a 0%, #0b1026 70%);
            background-attachment: fixed;
            letter-spacing: 0.01em;
        }
        
        .container {
            max-width: 800px;
            margin: 60px auto 100px;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* 顶部导航：使用 Playfair Display */
        .nav-bar { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            padding-bottom: 25px; 
            margin-bottom: 0; 
        }
        .back-link {
            color: var(--gogh-yellow);
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2em;
            transition: all 0.3s;
        }
        .back-link:hover { text-shadow: 0 0 10px var(--gogh-yellow); }

        /* 标签页容器：实现上下居中对齐 */
        .tab-container {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 25px 0; /* 这里的上下间距一致，确保按钮在两条线中间居中 */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
            overflow-x: auto;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-grey);
            padding: 8px 20px;
            border-radius: 8px; /* 增加圆角程度 */
            font-family: 'Playfair Display', serif;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover { border-color: var(--gogh-yellow); color: var(--text-white); }
        .tab-btn.active {
            background: rgba(252, 212, 64, 0.1);
            border-color: var(--gogh-yellow);
            color: var(--gogh-yellow);
            box-shadow: 0 0 10px rgba(252, 212, 64, 0.2);
        }

        /* 正文内容：17px, 1.85行高, 两端对齐 */
        #content { 
            line-height: 1.85; 
            font-size: 17px; 
            text-align: justify; 
            color: #e0e0e0; 
        }
        #content p { margin-bottom: 1.6em; font-weight: 300; }

        /* 视频样式 */
        iframe {
            width: 100%; aspect-ratio: 1080 / 2400;
            max-height: 80vh; max-width: calc(80vh * (1080 / 2400));
            border-radius: 4px; margin: 30px auto; display: block;
            border: 1px solid rgba(255, 255, 255, 0.1); background: #000;
        }

        .p-selector { display: flex; justify-content: center; gap: 10px; margin: 20px 0 40px; }
        .p-btn {
            padding: 6px 14px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05); color: var(--text-grey);
            border-radius: 4px; text-decoration: none; font-size: 0.85em; 
            font-family: 'Roboto', sans-serif; transition: 0.3s;
        }
        .p-btn.active-p { border-color: var(--gogh-yellow); color: var(--gogh-yellow); }

        /* --- 复原：星星返回顶部按钮 --- */
        #back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; align-items: center; gap: 8px;
            padding: 6px 15px; background: var(--glass-bg);
            border: none; border-radius: 20px;
            color: var(--gogh-yellow); cursor: pointer;
            z-index: 1001; backdrop-filter: blur(8px);
            opacity: 0; visibility: hidden; transition: all 0.4s ease;
            box-shadow: 0 2px 15px rgba(0,0,0,0.3);
            font-family: 'Playfair Display', serif;
        }

        #back-to-top.show { opacity: 1; visibility: visible; }
        #back-to-top:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.1); }
        #back-to-top svg { width: 14px; height: 14px; transition: transform 0.5s ease; }
        #back-to-top:hover svg { transform: rotate(90deg); }
        #back-to-top span { font-size: 0.85em; letter-spacing: 1px; font-weight: 700; }

        @media (max-width: 768px) {
            .container { padding: 25px 20px; margin: 0; border-radius: 0; border: none; }
            iframe { max-height: none; max-width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div class="container">
        <div class="nav-bar">
            <a href="#" onclick="window.history.length > 1 ? history.back() : window.location.href='index.html'; return false;" class="back-link">Event Menu</a>
        </div>
        <div class="tab-container">
            <button class="tab-btn" id="tab-zh" onclick="switchTab('zh')">ZH</button>
            <button class="tab-btn" id="tab-jp" onclick="switchTab('jp')">JP</button>
            <button class="tab-btn" id="tab-media" onclick="switchTab('media')">Media</button>
        </div>
        <div id="content">Loading record...</div>
    </div>

    <div id="back-to-top">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0L14.594 9.406L24 12L14.594 14.594L12 24L9.406 14.594L0 12L9.406 9.406L12 0Z"/>
        </svg>
        <span>TOP</span>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const baseFileName = urlParams.get('file');
        let currentP = urlParams.get('p') || '1';
        let currentTab = urlParams.has('p') ? 'media' : 'zh';

        function loadMarkdown(langSuffix) {
            if (!baseFileName) return;
            const targetFile = `stories/${baseFileName}/${langSuffix}.md`;
            fetch(`${targetFile}?v=${new Date().getTime()}`)
                .then(res => res.text())
                .then(text => {
                    let processed = text;
                    if (langSuffix === 'media') {
                        processed = text.replace(/page=\d+/g, `page=${currentP}`);
                    }
                    document.getElementById('content').innerHTML = marked.parse(processed);
                    updatePButtonUI();
                });
        }

        function updateTabUI(lang) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${lang}`).classList.add('active');
        }

        function updatePButtonUI() {
            document.querySelectorAll('.p-btn').forEach(btn => {
                btn.classList.toggle('active-p', btn.getAttribute('data-p') === currentP);
            });
        }

        function switchTab(langSuffix) {
            if (currentTab === langSuffix) return;
            currentTab = langSuffix;
            updateTabUI(langSuffix);
            window.scrollTo({ top: 0, behavior: "smooth" });
            loadMarkdown(langSuffix);
        }

        function startApp() {
            updateTabUI(currentTab);
            loadMarkdown(currentTab);
        }
        startApp();

        window.onscroll = function() {
            let winScroll = document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
            document.getElementById("back-to-top").classList.toggle("show", winScroll > 300);
        };
        document.getElementById("back-to-top").onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
    </script>
</body>
</html>
