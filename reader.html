<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading... - FGFS MEMOIRE</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0b1026;
            --glass-bg: rgba(15, 20, 35, 0.85);
            --glass-border: rgba(255, 223, 80, 0.3);
            --text-white: #f0f0f0;      
            --text-grey: #aaaaaa; 
            --gogh-yellow: #fcd440;     
        }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 3px;
            background: var(--gogh-yellow);
            width: 0%; z-index: 1000;
            box-shadow: 0 0 10px var(--gogh-yellow);
            transition: width 0.1s;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-white);
            /* 全面回归 Roboto */
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 30%, #1a254a 0%, #0b1026 70%);
            background-attachment: fixed;
            letter-spacing: 0.01em;
        }
        
        .container {
            max-width: 800px;
            margin: 60px auto 100px;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .nav-bar { margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .back-link {
            color: var(--gogh-yellow);
            text-decoration: none;
            font-family: var(--font-art);
            font-weight: 500;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        .back-link:hover { text-shadow: 0 0 10px var(--gogh-yellow); }

        .tab-container {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            overflow-x: auto;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-grey);
            padding: 6px 16px;
            border-radius: 4px; /* 改为更朴素的微圆角 */
            font-size: 0.9em;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover { border-color: var(--gogh-yellow); color: var(--text-white); }
        .tab-btn.active {
            background: rgba(252, 212, 64, 0.1);
            border-color: var(--gogh-yellow);
            color: var(--gogh-yellow);
        }

        /* 视频/iframe 样式：遵循你要求的“朴素自适应” */
        iframe {
            width: 100%;           
            aspect-ratio: 1080 / 2400;
            max-height: 80vh;
            max-width: calc(80vh * (1080 / 2400));
            border-radius: 4px;    
            margin: 30px auto;        
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: #000;      
            display: block;
        }

        .p-selector { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin: 20px 0 40px; }
        .p-btn {
            padding: 5px 12px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05); color: var(--text-grey);
            border-radius: 3px; text-decoration: none; font-size: 0.85em; transition: all 0.3s;
        }
        .p-btn:hover, .p-btn.active-p { border-color: var(--gogh-yellow); color: var(--gogh-yellow); }
        .p-btn.active-p { font-weight: 700; background: rgba(252, 212, 64, 0.05); }

        #content { line-height: 1.7; font-size: 1.05em; color: #e0e0e0; }
        #content h1 { font-weight: 700; color: var(--gogh-yellow); font-size: 2.2em; text-align: center; margin-bottom: 30px; letter-spacing: -0.02em; }
        #content h2 { font-weight: 500; color: var(--text-white); margin-top: 40px; border-bottom: 1px solid var(--glass-border); padding-bottom: 8px; }
        #content p { margin-bottom: 16px; text-align: justify; }
        #content blockquote { border-left: 3px solid var(--gogh-yellow); margin: 20px 0; padding: 10px 20px; color: #aaa; background: rgba(255,255,255,0.03); border-radius: 0 4px 4px 0; }

        #back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            padding: 8px 15px; background: var(--glass-bg); border-radius: 20px;
            color: var(--gogh-yellow); border: 1px solid var(--glass-border);
            cursor: pointer; opacity: 0; visibility: hidden; transition: 0.4s;
            font-size: 0.8em; font-weight: 700;
        }
        #back-to-top.show { opacity: 1; visibility: visible; }

@media (max-width: 768px) {
    .container { padding: 25px; margin: 0; border-radius: 0; border: none; }
    iframe { max-height: none; max-width: 100%; border-radius: 0; }
    
    /* --- 新增：手机端专项字号调整 --- */
    #content { 
        font-size: 16px; /* 这里填你希望在手机上显示的字号 */
    }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div class="container">
        <div class="nav-bar">
            <a href="#" onclick="window.history.length > 1 ? history.back() : window.location.href='index.html'; return false;" class="back-link">Event Menu</a>
        </div>
        <div class="tab-container">
            <button class="tab-btn" id="tab-zh" onclick="switchTab('zh')">ZH</button>
            <button class="tab-btn" id="tab-jp" onclick="switchTab('jp')">JP</button>
            <button class="tab-btn" id="tab-media" onclick="switchTab('media')">Media</button>
        </div>
        <div id="content">Loading record...</div>
    </div>
    <div id="back-to-top">TOP ↑</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const baseFileName = urlParams.get('file');
        let currentP = urlParams.get('p') || '1';
        let currentTab = urlParams.has('p') ? 'media' : 'zh';

        function loadMarkdown(langSuffix) {
            if (!baseFileName) return;
            const targetFile = `stories/${baseFileName}/${langSuffix}.md`;
            fetch(`${targetFile}?v=${new Date().getTime()}`)
                .then(res => res.text())
                .then(text => {
                    let processed = text;
                    if (langSuffix === 'media') {
                        processed = text.replace(/page=\d+/g, `page=${currentP}`);
                    }
                    document.getElementById('content').innerHTML = marked.parse(processed);
                    updatePButtonUI();
                });
        }

        function updateTabUI(lang) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${lang}`).classList.add('active');
        }

        function updatePButtonUI() {
            document.querySelectorAll('.p-btn').forEach(btn => {
                btn.classList.toggle('active-p', btn.getAttribute('data-p') === currentP);
            });
        }

        function switchTab(langSuffix) {
            if (currentTab === langSuffix) return;
            currentTab = langSuffix;
            updateTabUI(langSuffix);
            window.scrollTo({ top: 0, behavior: "smooth" });
            loadMarkdown(langSuffix);
        }

        // 启动应用
        function startApp() {
            updateTabUI(currentTab);
            loadMarkdown(currentTab);
        }
        startApp();

        // 进度条与回到顶部
        window.onscroll = function() {
            let winScroll = document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
            document.getElementById("back-to-top").classList.toggle("show", winScroll > 300);
        };
        document.getElementById("back-to-top").onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
    </script>
</body>
</html>
