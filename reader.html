<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading... - FGFS MEMOIRE</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 回归原始星空色调 */
            --bg-deep: #0b1026;
            --glass-bg: rgba(15, 20, 35, 0.85);
            --glass-border: rgba(255, 223, 80, 0.3);
            --text-white: #f0f0f0;      
            --text-grey: #aaaaaa; 
            --gogh-yellow: #fcd440;     
        }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 3px;
            background: var(--gogh-yellow); width: 0%; z-index: 1000;
            box-shadow: 0 0 10px var(--gogh-yellow);
            transition: width 0.1s;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-white);
            /* 严格执行指定的字体代码 */
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            /* 回归原始星空径向渐变 */
            background-image: radial-gradient(circle at 50% 30%, #1a254a 0%, #0b1026 70%);
            background-attachment: fixed;
        }
        
        .container {
            max-width: 800px;
            margin: 60px auto 100px;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .nav-bar { margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .back-link {
            color: var(--gogh-yellow);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        .back-link:hover { text-shadow: 0 0 10px var(--gogh-yellow); }

        .tab-container {
            display: flex; gap: 15px; margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px; overflow-x: auto;
        }

        .tab-btn {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-grey); padding: 8px 18px; border-radius: 4px;
            font-size: 0.9em; cursor: pointer; transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: rgba(255, 223, 80, 0.1);
            border-color: var(--gogh-yellow);
            color: var(--gogh-yellow);
        }

        /* --- 核心内容区：精准匹配截图参数 --- */
        #content { 
            line-height: 1.85; /* 严格按照截图比例 */
            font-size: 17px;    /* 严格按照截图视觉大小 */
            color: var(--text-white);
            text-align: justify; /* 保持两端对齐 */
        }

        #content p { margin-bottom: 1.5em; }

        /* 朴素自适应视频样式 */
        iframe {
            width: 100%; aspect-ratio: 1080 / 2400;
            max-height: 80vh; max-width: calc(80vh * (1080 / 2400));
            border-radius: 4px; margin: 30px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: #000; display: block;
        }

        .p-selector { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0 40px; }
        .p-btn {
            padding: 6px 16px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05); color: var(--text-grey);
            border-radius: 4px; text-decoration: none; font-size: 0.85em; transition: all 0.3s;
        }
        .p-btn:hover, .p-btn.active-p { border-color: var(--gogh-yellow); color: var(--gogh-yellow); }

        #back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            padding: 8px 15px; background: var(--glass-bg); border-radius: 20px;
            color: var(--gogh-yellow); border: 1px solid var(--glass-border);
            cursor: pointer; opacity: 0; visibility: hidden; transition: 0.4s;
            font-size: 0.8em; font-weight: 700;
        }
        #back-to-top.show { opacity: 1; visibility: visible; }

        @media (max-width: 768px) {
            .container { padding: 25px; margin: 0; border-radius: 0; border: none; }
            #content { font-size: 16.5px; } /* 移动端微调确保体感一致 */
            iframe { max-height: none; max-width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div class="container">
        <div class="nav-bar">
            <a href="#" onclick="window.history.length > 1 ? history.back() : window.location.href='index.html'; return false;" class="back-link">← Event Menu</a>
        </div>
        <div class="tab-container">
            <button class="tab-btn" id="tab-zh" onclick="switchTab('zh')">ZH</button>
            <button class="tab-btn" id="tab-jp" onclick="switchTab('jp')">JP</button>
            <button class="tab-btn" id="tab-media" onclick="switchTab('media')">Media</button>
        </div>
        <div id="content">Loading record...</div>
    </div>
    <div id="back-to-top">TOP ↑</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const baseFileName = urlParams.get('file');
        let currentP = urlParams.get('p') || '1';
        let currentTab = urlParams.has('p') ? 'media' : 'zh';

        function loadMarkdown(langSuffix) {
            if (!baseFileName) return;
            const targetFile = `stories/${baseFileName}/${langSuffix}.md`;
            fetch(`${targetFile}?v=${new Date().getTime()}`)
                .then(res => res.text())
                .then(text => {
                    let processed = text;
                    if (langSuffix === 'media') {
                        processed = text.replace(/page=\d+/g, `page=${currentP}`);
                    }
                    document.getElementById('content').innerHTML = marked.parse(processed);
                });
        }

        function updateTabUI(lang) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`tab-${lang}`);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function switchTab(langSuffix) {
            if (currentTab === langSuffix) return;
            currentTab = langSuffix;
            updateTabUI(langSuffix);
            window.scrollTo({ top: 0, behavior: "smooth" });
            loadMarkdown(langSuffix);
        }

        function startApp() {
            updateTabUI(currentTab);
            loadMarkdown(currentTab);
        }
        startApp();

        window.onscroll = function() {
            let winScroll = document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
            document.getElementById("back-to-top").classList.toggle("show", winScroll > 300);
        };
        document.getElementById("back-to-top").onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
    </script>
</body>
</html>
